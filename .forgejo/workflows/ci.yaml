on: [push, pull_request, workflow_dispatch]

jobs:
  ci-build:
    runs-on: docker
    container:
      image: alpine:3.23
    steps:
      - run: apk add --no-cache nodejs docker-cli make
      - uses: actions/checkout@v6
      - run: |
          GIT_BRANCH="${{ forgejo.ref_name }}"
          if [ "${GIT_BRANCH}" = "master" ]; then
            DOCKER_TAG="latest"
          else
            DOCKER_TAG="$(echo "${GIT_BRANCH}" | sed 's/[^a-zA-Z0-9._-]/-/g')"
          fi
          make clean all push DOCKER_TAG="${DOCKER_TAG}" DOCKER_REGISTRY="${{ vars.DOCKER_REGISTRY }}" DOCKER_USER="${{ vars.DOCKER_USER }}" DOCKER_TOKEN="${{ secrets.DOCKER_TOKEN }}"
